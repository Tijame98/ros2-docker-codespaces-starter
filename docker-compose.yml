services:
  status_publisher:
    build:
      context: .
      dockerfile: docker/ros2_app.Dockerfile
    container_name: status_publisher
    command: bash -c "source /opt/ros/humble/setup.bash && source /ros2_ws/install/setup.bash && ros2 run robot_status_demo status_publisher"
    environment:
      - ROS_DOMAIN_ID=42

  status_subscriber:
    build:
      context: .
      dockerfile: docker/ros2_app.Dockerfile
    container_name: status_subscriber
    command: bash -c "source /opt/ros/humble/setup.bash && source /ros2_ws/install/setup.bash && ros2 run robot_status_demo status_subscriber"
    environment:
      - ROS_DOMAIN_ID=42
    depends_on:
      - status_publisher

  foxglove_bridge:
    build:
      context: .
      dockerfile: docker/ros2_app.Dockerfile
    container_name: foxglove_bridge
    command: bash -c "source /opt/ros/humble/setup.bash && source /ros2_ws/install/setup.bash && ros2 launch foxglove_bridge foxglove_bridge_launch.xml port:=8765"
    environment:
      - ROS_DOMAIN_ID=42
    ports:
      - "8765:8765"
    depends_on:
      - status_publisher
      - status_subscriber